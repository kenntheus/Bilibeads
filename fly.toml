app = "bilibeads"
primary_region = "sin"

[build]

[env]
  APP_ENV        = "production"
  APP_DEBUG      = "false"
  APP_URL        = "https://bilibeads.fly.dev"
  LOG_CHANNEL    = "stderr"
  DB_CONNECTION  = "pgsql"
  SESSION_DRIVER = "file"
  CACHE_STORE    = "file"
  QUEUE_CONNECTION = "sync"

[http_service]
  internal_port       = 80
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[[mounts]]
  source      = "bilibeads_uploads"
  destination = "/var/www/html/public/uploads"
  initial_size = "1gb"
