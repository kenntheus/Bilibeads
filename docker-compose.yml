services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_NAME: Bilibeads
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: bilibeads
      DB_USERNAME: bilibeads
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "./deploy.sh && supervisord -c /etc/supervisor/conf.d/supervisord.conf"

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: bilibeads
      MYSQL_USER: bilibeads
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
